<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - A&J Residencia</title>
    <link rel="stylesheet" href="assets/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">

                <!-- Logo -->
                <div class="text-center mb-4">
                    <div class="logo-icon d-inline-flex align-items-center justify-content-center mb-3 shadow" style="width: 70px; height: 70px; font-size: 30px; border-radius: 50%;">
                        <i class="fa-solid fa-building"></i>
                    </div>
                    <h2 class="fw-bold text-dark mb-1">Residencia A&J</h2>
                    <p class="text-muted">Sistema de Gestión de Alquiler</p>
                </div>

                <!-- Formulario -->
                <div class="card border-0 shadow rounded-4">
                    <div class="card-body p-4 p-md-5">
                        <ul class="nav nav-pills nav-justified mb-4" id="loginTabs" role="tablist">
                            <li class="nav-item" role="presentation">
                                <button class="nav-link active rounded-pill fw-bold" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab" style="background-color: transparent;">Ingresar</button>
                            </li>
                            <li class="nav-item" role="presentation">
                                <button class="nav-link rounded-pill fw-bold text-secondary" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab" style="background-color: transparent;">Crear Cuenta</button>
                            </li>
                        </ul>
                        
                        <div class="tab-content" id="loginTabsContent">
                            <!-- TAB LOGIN -->
                            <div class="tab-pane fade show active" id="login" role="tabpanel">
                                <form id="formLogin" action="AuthController" method="POST">
                                    <input type="hidden" name="action" value="validar">

                                    <div class="mb-4">
                                        <label for="usuario" class="form-label fw-semibold text-secondary small text-uppercase">Correo electrónico</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light text-muted border-0 shadow-sm"><i class="fa-regular fa-user"></i></span>
                                            <input type="email" id="usuario" name="usuario" class="form-control border-0 bg-light shadow-sm" placeholder="Ingrese su correo" required>
                                        </div>
                                    </div>

                                    <div class="mb-4">
                                        <label for="password" class="form-label fw-semibold text-secondary small text-uppercase">Contraseña</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-light text-muted border-0 shadow-sm"><i class="fa-solid fa-lock"></i></span>
                                            <input type="password" id="password" name="password" class="form-control border-0 bg-light shadow-sm" placeholder="Ingrese su contraseña" required>
                                        </div>
                                    </div>

                                    <button type="submit" class="btn w-100 fw-bold py-3 rounded-pill text-white shadow-sm mt-2" style="background-color: #4a6cf7;">
                                        Iniciar Sesión &nbsp;<i class="fa-solid fa-arrow-right"></i>
                                    </button>
                                </form>
                            </div>
                            
                            <!-- TAB REGISTRO -->
                            <div class="tab-pane fade" id="register" role="tabpanel">
                                <form id="formRegister" action="AuthController" method="POST">
                                    <input type="hidden" name="action" value="registrarCliente">

                                    <div class="row">
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-semibold text-secondary small">NOMBRE</label>
                                            <input type="text" name="nombre" class="form-control border-0 bg-light shadow-sm" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-semibold text-secondary small">APELLIDOS</label>
                                            <input type="text" name="apellidos" class="form-control border-0 bg-light shadow-sm" required>
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-semibold text-secondary small">DNI</label>
                                            <input type="text" name="dni" class="form-control border-0 bg-light shadow-sm" required pattern="\d{8}">
                                        </div>
                                        <div class="col-md-6 mb-3">
                                            <label class="form-label fw-semibold text-secondary small">TELÉFONO</label>
                                            <input type="text" name="telefono" class="form-control border-0 bg-light shadow-sm" required>
                                        </div>
                                        <div class="col-12 mb-3">
                                            <label class="form-label fw-semibold text-secondary small">CORREO (USUARIO)</label>
                                            <input type="email" name="correo" class="form-control border-0 bg-light shadow-sm" required>
                                        </div>
                                        <div class="col-12 mb-4">
                                            <label class="form-label fw-semibold text-secondary small">CONTRASEÑA</label>
                                            <input type="password" name="password" class="form-control border-0 bg-light shadow-sm" required minlength="6">
                                        </div>
                                    </div>

                                    <button type="submit" class="btn w-100 fw-bold py-3 rounded-pill text-white shadow-sm mt-2" style="background-color: #28a745;">
                                        Registrarme &nbsp;<i class="fa-solid fa-user-plus"></i>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="assets/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function mostrarError(mensaje) {
            Swal.fire({
                icon: 'error',
                title: 'Acceso Denegado',
                text: mensaje || 'Ocurrió un error',
                confirmButtonColor: '#4a6cf7'
            });
        }
        
        // Estilo de los tabs
        document.querySelectorAll('button[data-bs-toggle="tab"]').forEach(tab => {
            tab.addEventListener('shown.bs.tab', function (event) {
                document.querySelectorAll('.nav-link').forEach(btn => {
                    btn.style.backgroundColor = 'transparent';
                    btn.style.color = '#6c757d';
                    btn.classList.add('text-secondary');
                });
                event.target.style.backgroundColor = event.target.id === 'login-tab' ? '#4a6cf7' : '#28a745';
                event.target.style.color = 'white';
                event.target.classList.remove('text-secondary');
            });
        });
        // Init tabs style
        document.getElementById('login-tab').style.backgroundColor = '#4a6cf7';
        document.getElementById('login-tab').style.color = 'white';

        // Interceptar login
        document.getElementById("formLogin").addEventListener("submit", function(e) {
            e.preventDefault();
            const formData = new URLSearchParams(new FormData(this));
            
            Swal.fire({ title: 'Validando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            fetch('AuthController', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success'){
                    window.location.href = data.redirect;
                } else {
                    mostrarError(data.message || 'Usuario o contraseña incorrectos.');
                }
            })
            .catch(error => {
                mostrarError('Ocurrió un error en el servidor.');
            });
        });

        // Interceptar registro
        document.getElementById("formRegister").addEventListener("submit", function(e) {
            e.preventDefault();
            const formData = new URLSearchParams(new FormData(this));
            
            Swal.fire({ title: 'Registrando...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            fetch('AuthController', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success'){
                    Swal.fire('¡Registrado!', 'Su cuenta ha sido creada exitosamente. Iniciando sesión...', 'success').then(() => {
                        window.location.href = data.redirect;
                    });
                } else {
                    mostrarError(data.message || 'Error en el registro');
                }
            })
            .catch(err => {
                mostrarError('Problemas de conexión con el servidor.');
            });
        });
    </script>
</body>
</html>
